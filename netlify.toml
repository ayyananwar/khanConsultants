[build]
  publish = "dist"
  command = "npm run build"
  functions = "netlify/functions"

[build.environment]
  VITE_BACKEND_URL = "https://khan-consultants-api.onrender.com"
  VITE_BOOKING_API_URL = "https://khan-consultants-api.onrender.com/api/v1/birth/action"
  VITE_SERVICE_ENQUIRY_API_URL = "https://khan-consultants-api.onrender.com/api/v1/enquiries/submit"
  VITE_CONTACT_ENQUIRY_API_URL = "https://khan-consultants-api.onrender.com/api/v1/contact/submit"

[[redirects]]
  from = "http://khanconsultants.in/*"
  to = "https://khanconsultants.in/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.khanconsultants.in/*"
  to = "https://khanconsultants.in/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.khanconsultants.in/*"
  to = "https://khanconsultants.in/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/home"
  to = "/"
  status = 301

[[redirects]]
  from = "/_preview/*"
  to = "/"
  status = 410
  force = true

[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200

[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=UTF-8"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"
